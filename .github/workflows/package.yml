name: Package Mod

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read mod info
        id: info
        run: |
          NAME=$(jq -r .name info.json)
          VERSION=$(jq -r .version info.json)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "folder=${NAME}_${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches info.json version
        run: |
          if [ "$GITHUB_REF_NAME" != "v${{ steps.info.outputs.version }}" ]; then
            echo "::error::Pushed tag '$GITHUB_REF_NAME' does not match info.json version '${{ steps.info.outputs.version }}' (expected 'v${{ steps.info.outputs.version }}'). Bump info.json or retag."
            exit 1
          fi

      - name: Create mod zip
        run: |
          FOLDER=${{ steps.info.outputs.folder }}
          mkdir "$FOLDER"
          # Copy the full mod tree, excluding everything in .makeignore (plus the
          # build folder itself) so subfolders like graphics/ and locale/ are
          # included automatically.
          rsync -r \
            --exclude-from .makeignore \
            --exclude "$FOLDER" \
            . "$FOLDER/"
          zip -9 -r "${FOLDER}.zip" "$FOLDER"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.info.outputs.version }}
          FOLDER=${{ steps.info.outputs.folder }}
          TAG="v${VERSION}"

          # Replace any existing release for this tag (keep the tag itself, since
          # it is the trigger) so re-runs publish a fresh asset.
          gh release delete "$TAG" --yes 2>/dev/null || true

          gh release create "$TAG" \
            "${FOLDER}.zip" \
            --title "v${VERSION}" \
            --notes "Factorio mod package for version ${VERSION}" \
            --latest
